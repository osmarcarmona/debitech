
# Package the template
AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: Personal Loan Administration System - Backend

Parameters:
  Stage:
    Type: String
    Default: Prod
    Description: Deployment stage (Dev, Staging, Prod)
    AllowedValues:
      - Dev
      - Staging
      - Prod

Globals:
  Function:
    Timeout: 10
    MemorySize: 128
    Runtime: python3.11
    Architectures:
      - arm64
    Environment:
      Variables:
        LOANS_TABLE: !Ref LoansTable
        BORROWERS_TABLE: !Ref BorrowersTable
        PAYMENTS_TABLE: !Ref PaymentsTable
        INTEREST_CYCLES_TABLE: !Ref InterestCyclesTable
        STAGE: !Ref Stage
    Tracing: PassThrough
    LoggingConfig:
      LogFormat: JSON
      LogGroup: !Sub /aws/lambda/${AWS::StackName}-${Stage}
    Tags:
      Stage: !Ref Stage
      Application: LoanAdministration

Resources:
  # DynamoDB Tables
  LoansTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Loans-${Stage}
      AttributeDefinitions:
        - AttributeName: loanId
          AttributeType: S
        - AttributeName: borrowerId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
      KeySchema:
        - AttributeName: loanId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: BorrowerIdIndex
          KeySchema:
            - AttributeName: borrowerId
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY
        - IndexName: StatusIndex
          KeySchema:
            - AttributeName: status
              KeyType: HASH
          Projection:
            ProjectionType: KEYS_ONLY
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Stage
          Value: !Ref Stage
        - Key: Application
          Value: LoanAdministration
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  BorrowersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Borrowers-${Stage}
      AttributeDefinitions:
        - AttributeName: borrowerId
          AttributeType: S
      KeySchema:
        - AttributeName: borrowerId
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Stage
          Value: !Ref Stage
        - Key: Application
          Value: LoanAdministration
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  PaymentsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub Payments-${Stage}
      AttributeDefinitions:
        - AttributeName: paymentId
          AttributeType: S
        - AttributeName: loanId
          AttributeType: S
      KeySchema:
        - AttributeName: paymentId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: LoanIdIndex
          KeySchema:
            - AttributeName: loanId
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Stage
          Value: !Ref Stage
        - Key: Application
          Value: LoanAdministration
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  InterestCyclesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub InterestCycles-${Stage}
      AttributeDefinitions:
        - AttributeName: cycleId
          AttributeType: S
        - AttributeName: loanId
          AttributeType: S
        - AttributeName: cycleStartDate
          AttributeType: S
      KeySchema:
        - AttributeName: cycleId
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: LoanIdIndex
          KeySchema:
            - AttributeName: loanId
              KeyType: HASH
            - AttributeName: cycleStartDate
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      BillingMode: PAY_PER_REQUEST
      SSESpecification:
        SSEEnabled: true
      Tags:
        - Key: Stage
          Value: !Ref Stage
        - Key: Application
          Value: LoanAdministration
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain

  # API Gateway
  LoanApi:
    Type: AWS::Serverless::Api
    Properties:
      StageName: !Ref Stage
      EndpointConfiguration:
        Type: REGIONAL
      Cors:
        AllowMethods: "'GET,POST,PUT,DELETE,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key'"
        AllowOrigin: "'*'"
      MethodSettings:
        - ResourcePath: '/*'
          HttpMethod: '*'
          DataTraceEnabled: false
          MetricsEnabled: false
          ThrottlingBurstLimit: 50
          ThrottlingRateLimit: 100
      Tags:
        Stage: !Ref Stage
        Application: LoanAdministration

  # Lambda Functions - Loans
  CreateLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub CreateLoan-${Stage}
      CodeUri: src/
      Handler: handlers.loans.create_loan
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InterestCyclesTable
      Events:
        CreateLoan:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans
            Method: post

  GetLoansFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetLoans-${Stage}
      CodeUri: src/
      Handler: handlers.loans.get_loans
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LoansTable
      Events:
        GetLoans:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans
            Method: get

  GetLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetLoan-${Stage}
      CodeUri: src/
      Handler: handlers.loans.get_loan
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LoansTable
      Events:
        GetLoan:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans/{id}
            Method: get

  UpdateLoanStatusFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub UpdateLoanStatus-${Stage}
      CodeUri: src/
      Handler: handlers.loans.update_loan_status
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InterestCyclesTable
      Events:
        UpdateLoanStatus:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans/{id}/status
            Method: put

  DeleteLoanFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub DeleteLoan-${Stage}
      CodeUri: src/
      Handler: handlers.loans.delete_loan
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
      Events:
        DeleteLoan:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans/{id}
            Method: delete

  # Lambda Functions - Borrowers
  CreateBorrowerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub CreateBorrower-${Stage}
      CodeUri: src/
      Handler: handlers.borrowers.create_borrower
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref BorrowersTable
      Events:
        CreateBorrower:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /borrowers
            Method: post

  GetBorrowersFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetBorrowers-${Stage}
      CodeUri: src/
      Handler: handlers.borrowers.get_borrowers
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BorrowersTable
      Events:
        GetBorrowers:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /borrowers
            Method: get

  GetBorrowerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetBorrower-${Stage}
      CodeUri: src/
      Handler: handlers.borrowers.get_borrower
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref BorrowersTable
      Events:
        GetBorrower:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /borrowers/{id}
            Method: get

  # Lambda Functions - Payments
  AddPaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub AddPayment-${Stage}
      CodeUri: src/
      Handler: handlers.payments.add_payment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - DynamoDBReadPolicy:
            TableName: !Ref LoansTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
      Events:
        AddPayment:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans/{id}/payments
            Method: post

  GetPaymentsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetPayments-${Stage}
      CodeUri: src/
      Handler: handlers.payments.get_payments
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref PaymentsTable
      Events:
        GetPayments:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans/{id}/payments
            Method: get

  UpdatePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub UpdatePayment-${Stage}
      CodeUri: src/
      Handler: handlers.payments.update_payment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
      Events:
        UpdatePayment:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /payments/{paymentId}
            Method: put

  DeletePaymentFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub DeletePayment-${Stage}
      CodeUri: src/
      Handler: handlers.payments.delete_payment
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref PaymentsTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
      Events:
        DeletePayment:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /payments/{paymentId}
            Method: delete

  # Lambda Functions - Reports
  GetReportsFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetReports-${Stage}
      CodeUri: src/
      Handler: handlers.reports.get_reports
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LoansTable
        - DynamoDBReadPolicy:
            TableName: !Ref BorrowersTable
        - DynamoDBReadPolicy:
            TableName: !Ref PaymentsTable
      Events:
        GetReports:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /reports
            Method: get

  # Lambda Functions - Scheduled Jobs
  ProcessInterestCyclesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub ProcessInterestCycles-${Stage}
      CodeUri: src/
      Handler: handlers.interest_cycles.process_daily_cycles
      Timeout: 300
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref LoansTable
        - DynamoDBCrudPolicy:
            TableName: !Ref InterestCyclesTable
        - DynamoDBCrudPolicy:
            TableName: !Ref LoansTable
      Events:
        DailySchedule:
          Type: Schedule
          Properties:
            Schedule: cron(0 6 * * ? *)
            Description: Process interest cycles daily at 6 AM UTC
            Enabled: true

  # Lambda Functions - Interest Cycles API
  GetInterestCyclesFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub GetInterestCycles-${Stage}
      CodeUri: src/
      Handler: handlers.interest_cycles.get_interest_cycles
      Policies:
        - DynamoDBReadPolicy:
            TableName: !Ref InterestCyclesTable
        - DynamoDBReadPolicy:
            TableName: !Ref LoansTable
      Events:
        GetInterestCycles:
          Type: Api
          Properties:
            RestApiId: !Ref LoanApi
            Path: /loans/{id}/interest-cycles
            Method: get

Outputs:
  ApiUrl:
    Description: API Gateway endpoint URL
    Value: !Sub https://${LoanApi}.execute-api.${AWS::Region}.amazonaws.com/${Stage}/
    Export:
      Name: !Sub ${AWS::StackName}-ApiUrl
  LoansTableName:
    Description: DynamoDB Loans Table
    Value: !Ref LoansTable
    Export:
      Name: !Sub ${AWS::StackName}-LoansTable
  BorrowersTableName:
    Description: DynamoDB Borrowers Table
    Value: !Ref BorrowersTable
    Export:
      Name: !Sub ${AWS::StackName}-BorrowersTable
  PaymentsTableName:
    Description: DynamoDB Payments Table
    Value: !Ref PaymentsTable
    Export:
      Name: !Sub ${AWS::StackName}-PaymentsTable
  Stage:
    Description: Deployment Stage
    Value: !Ref Stage
    Export:
      Name: !Sub ${AWS::StackName}-Stage
